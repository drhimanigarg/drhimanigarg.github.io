<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | strip_newlines | truncate: 160 }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:wght@500;600&family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <script>
    (function () {
      var palettes = [
        { a: "#14507f", b: "#1e6bb0", link: "#1e6bb0", dark: "#14507f" }, /* deep blue */
        { a: "#14507f", b: "#17a398", link: "#1e6bb0", dark: "#14507f" }, /* blue-teal */
        { a: "#8c3b12", b: "#c05621", link: "#b34a17", dark: "#8c3b12" }, /* copper */
        { a: "#1d4a38", b: "#2e7d5b", link: "#2e7d5b", dark: "#1d4a38" }, /* forest green */
        { a: "#6b1f2e", b: "#97324a", link: "#97324a", dark: "#6b1f2e" }, /* burgundy */
        { a: "#2b3a45", b: "#52646f", link: "#3e5c76", dark: "#2b3a45" }  /* graphite */
      ];
      var p = palettes[Math.floor(Math.random() * palettes.length)];
      var r = document.documentElement.style;
      r.setProperty("--accent-a", p.a);
      r.setProperty("--accent-b", p.b);
      r.setProperty("--flow-blue", p.link);
      r.setProperty("--flow-blue-dark", p.dark);
    })();
  </script>
</head>
<body>
  <header class="site-header">
    <div class="wrap header-inner">
      <a class="site-name" href="{{ '/' | relative_url }}">Himani Garg</a>
      <nav class="site-nav" aria-label="Main">
        <a href="{{ '/' | relative_url }}">Home</a>
        <a href="{{ '/research/' | relative_url }}">Research</a>
        <a href="{{ '/publications/' | relative_url }}">Publications</a>
        <a href="{{ '/talks/' | relative_url }}">Talks</a>
        <a href="{{ '/teaching/' | relative_url }}">Teaching</a>
        <a href="{{ '/fossee/' | relative_url }}">FOSSEE</a>
        <a href="{{ '/news/' | relative_url }}">News</a>
        <a href="{{ '/cv/' | relative_url }}">CV</a>
      </nav>
    </div>
    <div class="turbo-bar" role="presentation"></div>
  </header>

  <main class="wrap">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="turbo-bar" role="presentation"></div>
    <div class="wrap footer-inner">
      <p>
        Dr. Himani Garg · Department of Energy Sciences, Lund University, Sweden<br>
        <a href="mailto:himani.garg@energy.lth.se">himani.garg@energy.lth.se</a> ·
        <a href="https://orcid.org/0000-0002-5223-0567">ORCID</a> ·
        <a href="https://scholar.google.com/citations?user=J3hkS44AAAAJ">Google Scholar</a>
      </p>
      <p class="colophon">Built with Jekyll · Hosted on GitHub Pages</p>
    </div>
  </footer>
</body>
</html>
