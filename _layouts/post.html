---
layout: default
---
<article class="post">
  <p class="post-date">{{ page.date | date: "%-d %B %Y" }}{% if page.location %} · {{ page.location }}{% endif %}</p>
  <h1>{{ page.title }}</h1>
  {{ content }}
  <p class="back-link"><a href="{{ '/news/' | relative_url }}">&larr; All news</a></p>
</article>
